<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REN 恋</title>
<style>
  :root {
    --cream: #FAF7F2;
    --plum: #4A1942;
    --plum-soft: #6d2a63;
    --border: #e3d8d0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--cream);
    color: #2b2b2b;
    font-family: Georgia, 'Times New Roman', serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---- top header ---- */
  header.site {
    flex: none;
    text-align: center;
    padding: 18px 16px 14px;
    background: var(--cream);
    border-bottom: 1px solid var(--border);
  }
  header.site h1 {
    font-family: Georgia, serif;
    color: var(--plum);
    font-size: 2rem;
    letter-spacing: 0.14em;
    margin: 0;
    font-weight: normal;
  }
  header.site .sub {
    color: var(--plum-soft);
    font-style: italic;
    font-size: 0.9rem;
    margin-top: 2px;
    opacity: 0.8;
  }

  /* ---- app body: sidebar + workspace ---- */
  .app {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* sidebar timeline */
  .sidebar {
    width: 250px;
    flex: none;
    background: #fff;
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
  }
  .sidebar .timeline-title {
    font-family: Georgia, serif;
    color: var(--plum);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin: 0 0 16px;
    opacity: 0.75;
  }
  .timeline-card {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    text-align: left;
    background: #fbf9f6;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 14px;
    margin-bottom: 12px;
    cursor: pointer;
    font-family: Georgia, serif;
    color: #3a2a34;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  }
  .timeline-card:hover { border-color: var(--plum-soft); transform: translateY(-1px); }
  .timeline-card .tc-icon { font-size: 1.4rem; line-height: 1; flex: none; }
  .timeline-card .tc-text { display: flex; flex-direction: column; min-width: 0; }
  .timeline-card .tc-title { font-size: 1rem; }
  .timeline-card .tc-meta { font-size: 0.78rem; opacity: 0.7; margin-top: 2px; }
  .timeline-card.active {
    background: var(--plum);
    border-color: var(--plum);
    color: var(--cream);
    box-shadow: 0 2px 8px rgba(74,25,66,0.25);
  }
  .timeline-card.active .tc-meta { opacity: 0.85; }
  .timeline-connector {
    width: 1px;
    height: 10px;
    background: var(--border);
    margin: -8px auto 4px 27px;
  }

  /* workspace */
  .workspace {
    flex: 1;
    min-width: 0;
    overflow-y: auto;
    padding: 24px 28px 28px;
  }
  .moment-banner {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 22px;
  }
  .moment-banner .mb-icon { font-size: 2rem; line-height: 1; }
  .moment-banner .mb-title {
    font-family: Georgia, serif;
    color: var(--plum);
    font-size: 1.5rem;
  }
  .moment-banner .mb-meta {
    font-size: 0.85rem;
    color: var(--plum-soft);
    font-style: italic;
    margin-top: 2px;
  }

  .cols {
    display: grid;
    grid-template-columns: 1.55fr 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 900px) { .cols { grid-template-columns: 1fr; } }

  .field-label, .col-title {
    font-family: Georgia, serif;
    color: var(--plum);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 0 0 8px;
    opacity: 0.8;
    display: block;
  }

  textarea {
    width: 100%;
    min-height: 150px;
    resize: vertical;
    font-family: Georgia, serif;
    font-size: 0.95rem;
    line-height: 1.55;
    color: #3a3a3a;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .share-btn {
    margin: 14px 0 0;
    background: var(--plum);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px 22px;
    font-family: Georgia, serif;
    font-size: 0.98rem;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .share-btn:hover { background: var(--plum-soft); }
  .share-btn:disabled { opacity: 0.5; cursor: default; }

  .narration {
    margin-top: 22px;
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 1rem;
    line-height: 1.75;
    color: #36242f;
    white-space: pre-wrap;
    overflow-wrap: break-word;
  }
  .narration .placeholder { color: #b6a9a0; font-style: italic; }
  .narration .working { color: var(--plum-soft); font-style: italic; }
  .narration .annotation {
    font-style: normal;
    background: #f4ecf2;
    border-left: 3px solid var(--plum);
    padding: 10px 14px;
    border-radius: 4px;
    margin-bottom: 16px;
    font-size: 0.92rem;
    color: var(--plum);
  }

  /* character analysis (plum panel, cream text) */
  .arc-card {
    background: var(--plum);
    color: var(--cream);
    border-radius: 12px;
    padding: 20px 20px 22px;
    box-shadow: 0 3px 12px rgba(74,25,66,0.2);
    position: sticky;
    top: 0;
  }
  .arc-card .arc-label {
    font-family: Georgia, serif;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    opacity: 0.7;
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(250,247,242,0.2);
    padding-bottom: 10px;
  }
  .arc-card .arc-body {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 0.98rem;
    line-height: 1.7;
    white-space: pre-wrap;
    overflow-wrap: break-word;
  }
  .arc-card .arc-body.empty { opacity: 0.55; font-size: 0.9rem; }

  /* ---- execution log (unchanged) ---- */
  .log-wrap {
    flex: none;
    background: #1a1a1a;
    border-top: 2px solid #000;
  }
  .log-head {
    color: #00ff88;
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    font-size: 0.75rem;
    padding: 6px 16px;
    letter-spacing: 0.08em;
    opacity: 0.7;
    border-bottom: 1px solid #2a2a2a;
  }
  #log {
    height: 200px;
    overflow-y: auto;
    padding: 10px 16px;
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    font-size: 0.78rem;
    line-height: 1.55;
    color: #00ff88;
  }
  #log .line { white-space: pre-wrap; word-break: break-word; }
  #log .ts { color: #4a7; opacity: 0.75; }
  #log .wrote { color: #ffd166; }
  #log .recalled { color: #5cd6ff; }
  #log .query { color: #c792ea; }
  #log .err { color: #ff6b6b; }
</style>
</head>
<body>

<header class="site">
  <h1>REN 恋</h1>

<div class="app">
  <!-- Left sidebar: Emily's Story Timeline -->
  <aside class="sidebar">

<!-- Local secrets (gitignored). Copy config.example.js -> config.js and fill in keys. -->
<script src="config.js"></script>
<script>
/* ============================================================
   KEYS — fill these in
   ============================================================ */
// Keys are loaded from config.js (gitignored). Copy config.example.js -> config.js
// and fill in your keys. See README for details.
const CFG = window.REN_CONFIG || {};
const HYDRA_KEY  = CFG.HYDRA_KEY  || "YOUR_HYDRA_KEY_HERE";
const OPENAI_KEY = CFG.OPENAI_KEY || "YOUR_OPENAI_KEY_HERE";

const HYDRA_BASE  = "https://api.hydradb.com";
const TENANT_ID   = "ren_dev";
const MODEL       = "gpt-4o";

// When the page is served by proxy.js (http/https) we route everything through
// the local proxy — keys stay on the server and there are no CORS issues.
// Opened directly as a file:// the app falls back to calling the APIs directly
// using the keys from config.js.
const USE_PROXY = location.protocol === "http:" || location.protocol === "https:";

/* ============================================================
   Logging helpers
   ============================================================ */
const logEl = document.getElementById("log");

function ts() {
  const d = new Date();
  const p = n => String(n).padStart(2, "0");
  const ms = String(d.getMilliseconds()).padStart(3, "0");
  return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}.${ms}`;
}

function logLine(text, cls = "") {
  const line = document.createElement("div");
  line.className = "line";
  const stamp = document.createElement("span");
  stamp.className = "ts";
  stamp.textContent = `[${ts()}] `;
  const body = document.createElement("span");
  if (cls) body.className = cls;
  body.textContent = text;
  line.appendChild(stamp);
  line.appendChild(body);
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

/* ============================================================
   HydraDB client
   ============================================================ */
async function hydraQuery(query) {
  logLine(`→ QUERYING HydraDB :: "${query}"`, "query");
  try {
    let texts;
    if (USE_PROXY) {
      const res = await fetch("/api/hydra/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status} ${(await res.json().catch(() => ({}))).error || ""}`);
      texts = (await res.json()).memories || [];
    } else {
      const res = await fetch(`${HYDRA_BASE}/query`, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${HYDRA_KEY}`,
          "API-Version": "2",
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ tenant_id: TENANT_ID, type: "memory", query }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const chunks = (data && data.data && data.data.chunks) || [];
      texts = chunks.map(c => c.chunkContent).filter(Boolean);
    }
    logLine(`← RECALLED ${texts.length} memories`, "recalled");
    return texts;
  } catch (e) {
    logLine(`← RECALLED 0 memories (${e.message})`, "recalled");
    return [];
  }
}

async function hydraIngest(text) {
  try {
    if (USE_PROXY) {
      const res = await fetch("/api/hydra/ingest", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status} ${(await res.json().catch(() => ({}))).error || ""}`);
    } else {
      const form = new FormData();
      form.append("type", "memory");
      form.append("tenant_id", TENANT_ID);
      form.append("memories", JSON.stringify([{ text }]));
      const res = await fetch(`${HYDRA_BASE}/context/ingest`, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${HYDRA_KEY}`,
          "API-Version": "2",
        },
        body: form,
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
    }
    logLine(`→ WROTE narration to HydraDB :: "${text.slice(0, 80)}${text.length > 80 ? "…" : ""}"`, "wrote");
  } catch (e) {
    logLine(`→ WROTE failed (${e.message})`, "err");
  }
}

/* ============================================================
   OpenAI client
   ============================================================ */
async function callRen(system, userContent) {
  if (USE_PROXY) {
    const res = await fetch("/api/openai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ system, user: userContent }),
    });
    if (!res.ok) {
      const err = (await res.json().catch(() => ({}))).error || `HTTP ${res.status}`;
      throw new Error(`Ren (proxy): ${err}`);
    }
    return (await res.json()).text;
  }
  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${OPENAI_KEY}`,
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 1000,
      messages: [
        { role: "system", content: system },
        { role: "user", content: userContent },
      ],
    }),
  });
  if (!res.ok) {
    const errText = await res.text().catch(() => "");
    throw new Error(`OpenAI HTTP ${res.status} ${errText.slice(0, 200)}`);
  }
  const data = await res.json();
  return data.choices[0].message.content;
}

/* ============================================================
   Moments + UI state
   ============================================================ */
const MOMENTS = {
  1: {
    icon: "💔", title: "The Ghosting", meta: "Christian · 6 months ago",
    story: `Christian asked if the toiletry bag was mine. I said yes lol, I left it for next time, sorry for not telling you. He went quiet. I reached out a few times about hanging out — no response. Eventually I asked: are you ghosting me? He replied 'haha.' That was it.`,
  },
  2: {
    icon: "✨", title: "The Reveal", meta: "Christian reaches out · present",
    story: `I just got into Stanford MBA. Christian reached out to congratulate me. He said he was intimidated by me and the toiletry bag sealed it for him — he felt like I was too comfortable and he wasn't on my level. He's been quietly supporting my LinkedIn posts ever since. A year later he got into Chicago MBA. I congratulated him. He said he felt bad it didn't work out and wished me the best.`,
  },
  3: {
    icon: "🌱", title: "New Chapter", meta: "Raj · this week",
    story: `There's this cute Indian guy I've been seeing. He's gone quiet on me this week. Honestly? Could be him, could be me — but I'm not going to spiral about it. I'll see what happens.`,
  },
};

// Per-moment result store so switching the timeline keeps each moment's output.
const results = { 1: null, 2: null, 3: null };
let activeMoment = 1;

// Pull the character-analysis / arc note out of Ren's narration so it can be
// shown separately in the Character Analysis panel.
function splitArc(text) {
  const re = /\n[ \t]*(?:\d+\.\s*)?(?:updated\s+)?character\s+(?:development\s+note|arc\s+note|arc|analysis)\b[^\n]*\n?/i;
  const m = re.exec(text);
  if (m && m.index > 0) {
    let body = text.slice(0, m.index);
    let arc = text.slice(m.index + m[0].length).trim();
    const afterColon = m[0].split(/:(.*)/s)[1];
    if (afterColon && afterColon.trim()) arc = (afterColon.trim() + (arc ? "\n\n" + arc : "")).trim();
    return { body: cleanBody(body), arc };
  }
  // Fallback: treat the final paragraph as the character note.
  const paras = text.split(/\n\s*\n/).map(p => p.trim()).filter(Boolean);
  if (paras.length > 1) {
    const arc = paras.pop();
    return { body: cleanBody(paras.join("\n\n")), arc };
  }
  return { body: cleanBody(text), arc: "" };
}
function cleanBody(b) {
  return b.replace(/^\s*\d+\.\s*/, "").replace(/\n[ \t]*\d+\.\s*$/, "").trim();
}

/* ============================================================
   Rendering
   ============================================================ */
function renderActive() {
  const m = MOMENTS[activeMoment];
  document.getElementById("moment-icon").textContent = m.icon;
  document.getElementById("moment-title").textContent = m.title;
  document.getElementById("moment-meta").textContent = m.meta;
  document.getElementById("story-input").value = m.story;

  const nar = document.getElementById("narration");
  const arcEl = document.getElementById("arc-body");
  const r = results[activeMoment];

  // Narration column
  nar.innerHTML = "";
  if (!r) {
    nar.innerHTML = `<span class="placeholder">Ren's narration will appear here…</span>`;
  } else if (r.working) {
    nar.innerHTML = `<span class="working">Ren is reading the memory and writing…</span>`;
  } else if (r.error) {
    nar.innerHTML = `<span class="placeholder">⚠ ${r.error}</span>`;
  } else {
    if (r.annotation) {
      const a = document.createElement("div");
      a.className = "annotation";
      a.textContent = r.annotation;
      nar.appendChild(a);
    }
    const body = document.createElement("div");
    body.textContent = r.body;
    nar.appendChild(body);
  }

  // Character Analysis column
  if (r && !r.working && !r.error && r.arc) {
    arcEl.textContent = r.arc;
    arcEl.classList.remove("empty");
  } else if (r && r.working) {
    arcEl.textContent = "Reading Emily's arc…";
    arcEl.classList.add("empty");
  } else {
    arcEl.textContent = "Emily's character arc will surface here once Ren has narrated this moment.";
    arcEl.classList.add("empty");
  }
}

function selectMoment(n) {
  activeMoment = n;
  document.querySelectorAll(".timeline-card").forEach(c =>
    c.classList.toggle("active", Number(c.dataset.moment) === n));
  renderActive();
}

/* ============================================================
   UI helpers (called by the unchanged panel logic below)
   ============================================================ */
function inputText(n) { return MOMENTS[n].story.trim(); }
function setWorking(n) {
  results[n] = { working: true };
  if (n === activeMoment) renderActive();
}
function setNarration(n, text, annotation) {
  const { body, arc } = splitArc(text);
  results[n] = { annotation: annotation || null, body, arc };
  if (n === activeMoment) renderActive();
}
function setError(n, msg) {
  results[n] = { error: msg };
  if (n === activeMoment) renderActive();
}

/* ============================================================
   Panel logic
   ============================================================ */
async function runPanel(n) {
  const btn = document.getElementById("share-btn");
  btn.disabled = true;
  setWorking(n);
  try {
    if (n === 1) await panel1();
    else if (n === 2) await panel2();
    else if (n === 3) await panel3();
  } catch (e) {
    logLine(`✗ ${e.message}`, "err");
    setError(n, e.message);
  } finally {
    btn.disabled = false;
  }
}

/* ---- Panel 1: The Ghosting ---- */
async function panel1() {
  const story = inputText(1);

  await hydraQuery("Emily history relationships ghosting");

  const system =
    "You are Ren, a warm literary narrator. Write a third-person omniscient " +
    "narration of this event — 3-4 paragraphs. You must inhabit BOTH people's " +
    "inner worlds. Emily's perspective AND the other person's interior " +
    "experience, fears, and assumptions. This is not a journal. It is a novel " +
    "scene where both characters are fully human. End with one sentence of " +
    "character analysis about Emily. Never be reassuring or preachy.";

  const narration = await callRen(system, story);
  setNarration(1, narration);

  await hydraIngest(
    "Moment 1 - Christian ghosting: " + narration.slice(0, 400) +
    " ... Emily's pattern: tends toward self-blame, needs prompting to consider " +
    "alternatives. Christian's profile: warm and communicative, suddenly went " +
    "quiet — likely something internal."
  );
}

/* ---- Panel 2: The Reveal ---- */
async function panel2() {
  const story = inputText(2);

  const memories = await hydraQuery("Christian Emily ghosting toiletry bag");
  if (memories.length) {
    logLine(`   ↳ first memory: "${memories[0].slice(0, 120)}${memories[0].length > 120 ? "…" : ""}"`, "recalled");
  }

  const system =
    "You are Ren. You have memory of a past chapter. A new chapter has arrived " +
    "that recontextualizes everything. Write two things:\n" +
    "1. An annotation to the original chapter — what we now know was true that " +
    "we couldn't have known then (2-3 sentences, start with 'What we now know:')\n" +
    "2. A new scene narrating this moment of revelation, again from both " +
    "perspectives — Emily receiving this information, and what Christian carried " +
    "all this time.\n" +
    "End with an updated character arc note for Emily: how has she grown since Moment 1?";

  const userContent =
    "PAST CHAPTER (recalled from memory):\n" +
    (memories.length ? memories.join("\n---\n") : "(no prior memory found)") +
    "\n\nNEW CHAPTER:\n" + story;

  const out = await callRen(system, userContent);

  // Split out the leading "What we now know:" annotation if present.
  let annotation = null, rest = out;
  const idx = out.indexOf("What we now know:");
  if (idx !== -1) {
    const after = out.slice(idx);
    const para = after.split(/\n\s*\n/)[0];
    annotation = para.trim();
    rest = (out.slice(0, idx) + after.slice(para.length)).trim();
  }
  setNarration(2, rest, annotation);

  await hydraIngest(
    "Moment 3 update - Christian revealed intimidation. Original narrative " +
    "corrected: his silence was self-protection, not rejection. Emily character " +
    "update: more empathetic, self-appreciative, able to hold complexity. " +
    "Narrative: " + rest.slice(0, 300)
  );
}

/* ---- Panel 3: New Ghost, New Emily ---- */
